<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ma calculatrice</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div>
          <h1>Ma calculatrice</h1>
        </div>
      </div>

      <form id="calc-form" class="calc-grid">
        <input type="number" step="any" id="a" required placeholder="Nombre A" />
        <select id="op">
          <option value="+">+</option>
          <option value="-">-</option>
          <option value="*">*</option>
          <option value="/">/</option>
        </select>
        <input type="number" step="any" id="b" required placeholder="Nombre B" />
        <button type="submit">Calculer</button>
        <button type="button" id="clear-history" class="secondary">Effacer l'historique</button>
      </form>

      <div class="result-box" id="result" aria-live="polite">
        <div class="result-left">Dernier résultat</div>
        <div class="result-val">—</div>
      </div>

      <section class="history">
        <h2>Historique</h2>
        <ul id="history-list"></ul>
      </section>
    </main>

    <script src="/static/calculator.js"></script>
  </body>
</html>
